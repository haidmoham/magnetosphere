<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <radialGradient id="bg" cx="50%" cy="45%" r="70%">
      <stop offset="0%" stop-color="#1e0038"/>
      <stop offset="60%" stop-color="#0c0022"/>
      <stop offset="100%" stop-color="#04000e"/>
    </radialGradient>
    <radialGradient id="halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00f0ff" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#00f0ff" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow-sm" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-md" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-lg" x="-150%" y="-150%" width="400%" height="400%">
      <feGaussianBlur stdDeviation="14" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Central halo behind title -->
  <ellipse cx="600" cy="290" rx="480" ry="160" fill="url(#halo)"/>

  <!-- Scanline overlay (very subtle) -->
  <rect width="1200" height="630" fill="url(#scanlines)" opacity="0.03"/>

  <!-- Border -->
  <rect x="20" y="20" width="1160" height="590" fill="none"
        stroke="rgba(0,240,255,0.14)" stroke-width="1" rx="3"/>

  <!-- ── Particle field ──────────────────────────────────────── -->
  <!-- cyan outer ring particles -->
  <circle cx="88"  cy="72"  r="1.5" fill="#00f0ff" opacity="0.55" filter="url(#glow-sm)"/>
  <circle cx="210" cy="45"  r="1"   fill="#00f0ff" opacity="0.4"/>
  <circle cx="155" cy="118" r="2"   fill="#00f0ff" opacity="0.5" filter="url(#glow-sm)"/>
  <circle cx="44"  cy="190" r="1.5" fill="#00f0ff" opacity="0.35"/>
  <circle cx="310" cy="88"  r="1"   fill="#ff3df0" opacity="0.5"/>
  <circle cx="390" cy="55"  r="1.5" fill="#00f0ff" opacity="0.45" filter="url(#glow-sm)"/>
  <circle cx="480" cy="38"  r="1"   fill="#ff3df0" opacity="0.3"/>
  <circle cx="72"  cy="320" r="1"   fill="#00f0ff" opacity="0.3"/>
  <circle cx="48"  cy="440" r="1.5" fill="#ff3df0" opacity="0.4" filter="url(#glow-sm)"/>
  <circle cx="110" cy="510" r="1"   fill="#00f0ff" opacity="0.25"/>
  <circle cx="180" cy="570" r="1.5" fill="#00f0ff" opacity="0.35"/>
  <circle cx="290" cy="585" r="1"   fill="#ff3df0" opacity="0.4"/>
  <circle cx="420" cy="592" r="1.5" fill="#00f0ff" opacity="0.3"/>
  <circle cx="560" cy="600" r="1"   fill="#ff3df0" opacity="0.25"/>
  <circle cx="640" cy="598" r="1.5" fill="#00f0ff" opacity="0.35"/>
  <circle cx="780" cy="590" r="1"   fill="#ff3df0" opacity="0.3"/>
  <circle cx="900" cy="585" r="1.5" fill="#00f0ff" opacity="0.4" filter="url(#glow-sm)"/>
  <circle cx="1020" cy="575" r="1" fill="#ff3df0" opacity="0.35"/>
  <circle cx="1110" cy="555" r="1.5" fill="#00f0ff" opacity="0.3"/>
  <circle cx="1155" cy="480" r="1" fill="#ff3df0" opacity="0.4"/>
  <circle cx="1160" cy="360" r="1.5" fill="#00f0ff" opacity="0.35" filter="url(#glow-sm)"/>
  <circle cx="1155" cy="240" r="1" fill="#ff3df0" opacity="0.3"/>
  <circle cx="1145" cy="130" r="1.5" fill="#00f0ff" opacity="0.5" filter="url(#glow-sm)"/>
  <circle cx="1090" cy="60"  r="1"   fill="#ff3df0" opacity="0.45"/>
  <circle cx="980"  cy="40"  r="1.5" fill="#00f0ff" opacity="0.4" filter="url(#glow-sm)"/>
  <circle cx="870"  cy="48"  r="1"   fill="#ff3df0" opacity="0.35"/>
  <circle cx="760"  cy="36"  r="1.5" fill="#00f0ff" opacity="0.45"/>
  <circle cx="650"  cy="42"  r="1"   fill="#ff3df0" opacity="0.3"/>
  <circle cx="540"  cy="50"  r="1.5" fill="#00f0ff" opacity="0.4" filter="url(#glow-sm)"/>
  <!-- mid-field particles (closer to center) -->
  <circle cx="160" cy="200" r="2.5" fill="#00f0ff" opacity="0.45" filter="url(#glow-sm)"/>
  <circle cx="240" cy="160" r="1.5" fill="#ff3df0" opacity="0.5" filter="url(#glow-sm)"/>
  <circle cx="340" cy="140" r="2"   fill="#00f0ff" opacity="0.4" filter="url(#glow-sm)"/>
  <circle cx="440" cy="110" r="1.5" fill="#ff3df0" opacity="0.45"/>
  <circle cx="860" cy="110" r="2"   fill="#00f0ff" opacity="0.4" filter="url(#glow-sm)"/>
  <circle cx="950" cy="140" r="1.5" fill="#ff3df0" opacity="0.5" filter="url(#glow-sm)"/>
  <circle cx="1040" cy="170" r="2.5" fill="#00f0ff" opacity="0.45" filter="url(#glow-sm)"/>
  <circle cx="130" cy="400" r="2"   fill="#ff3df0" opacity="0.35" filter="url(#glow-sm)"/>
  <circle cx="200" cy="460" r="1.5" fill="#00f0ff" opacity="0.4"/>
  <circle cx="1000" cy="460" r="2"   fill="#00f0ff" opacity="0.35" filter="url(#glow-sm)"/>
  <circle cx="1070" cy="390" r="1.5" fill="#ff3df0" opacity="0.4"/>
  <!-- accent bright dots -->
  <circle cx="310" cy="210" r="3"   fill="#00f0ff" opacity="0.65" filter="url(#glow-md)"/>
  <circle cx="890" cy="210" r="2.5" fill="#ff3df0" opacity="0.6"  filter="url(#glow-md)"/>
  <circle cx="200" cy="360" r="2"   fill="#00f0ff" opacity="0.5"  filter="url(#glow-sm)"/>
  <circle cx="1000" cy="360" r="2.5" fill="#00f0ff" opacity="0.55" filter="url(#glow-md)"/>
  <circle cx="480" cy="160" r="2"   fill="#ff3df0" opacity="0.55" filter="url(#glow-sm)"/>
  <circle cx="720" cy="160" r="2.5" fill="#00f0ff" opacity="0.5"  filter="url(#glow-md)"/>
  <circle cx="440" cy="430" r="2"   fill="#ff3df0" opacity="0.45" filter="url(#glow-sm)"/>
  <circle cx="760" cy="430" r="2"   fill="#00f0ff" opacity="0.45" filter="url(#glow-sm)"/>
  <!-- ────────────────────────────────────────────────────────── -->

  <!-- VOIDPULSE -->
  <text x="600" y="308"
    text-anchor="middle"
    font-family="'Arial Black', 'Impact', 'Arial', sans-serif"
    font-weight="900"
    font-size="92"
    letter-spacing="24"
    fill="#00f0ff"
    filter="url(#glow-lg)">VOIDPULSE</text>

  <!-- Divider line -->
  <line x1="380" y1="332" x2="820" y2="332"
        stroke="rgba(0,240,255,0.2)" stroke-width="1"/>

  <!-- Subtitle -->
  <text x="600" y="364"
    text-anchor="middle"
    font-family="'Courier New', 'Lucida Console', monospace"
    font-size="15"
    letter-spacing="9"
    fill="rgba(246,214,255,0.55)">MUSIC VISUALIZER</text>

  <!-- URL -->
  <text x="600" y="584"
    text-anchor="middle"
    font-family="'Courier New', monospace"
    font-size="13"
    letter-spacing="5"
    fill="rgba(0,240,255,0.28)">voidpulse.xyz</text>
</svg>
